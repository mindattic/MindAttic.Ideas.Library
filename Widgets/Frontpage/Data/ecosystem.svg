<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 400" role="img" aria-labelledby="eco-diagram-title eco-diagram-desc" font-family="Outfit, system-ui, sans-serif">
  <title id="eco-diagram-title">MindAttic ecosystem dependency flow</title>
  <desc id="eco-diagram-desc">MindAttic.Vault provides credentials and settings to MindAttic.Legion, MindAttic.Psst, MindAttic.Console and the apps. MindAttic.Legion provides multi-LLM consensus to the apps. MindAttic.UiUx provides shared UI components and themes to the apps. Apps: IdiotProof, Tutor, ThinkTank, MediaButler, TaxRateCollector.</desc>
  <defs>
    <marker id="eco-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3d6fa3"/>
    </marker>
  </defs>
  <style>
    .eco-node { fill: #1a1e25; stroke: #6ba3e8; stroke-width: 1.5; }
    .eco-edge { fill: none; stroke: #3d6fa3; stroke-width: 2; marker-end: url(#eco-arrow); }
    .eco-title { fill: #e8eaf0; font-size: 15px; font-weight: 600; text-anchor: middle; }
    .eco-sub   { fill: #9aa0b0; font-size: 11px; text-anchor: middle; }
  </style>

  <!-- edges (drawn first, behind nodes). No two arrows overlap: Vault fans out
       to the service tier, a straight spine runs Vault->Legion->Apps, and the
       two skip edges (Vault->Apps and UiUx->Apps) are routed as orthogonal
       lanes down the outer margins, clear of every other edge. -->
  <line class="eco-edge" x1="248" y1="70"  x2="112" y2="150"/>                          <!-- Vault -> Psst -->
  <line class="eco-edge" x1="290" y1="70"  x2="290" y2="150"/>                          <!-- Vault -> Legion -->
  <line class="eco-edge" x1="332" y1="70"  x2="505" y2="150"/>                          <!-- Vault -> Console -->
  <line class="eco-edge" x1="290" y1="198" x2="290" y2="308"/>                          <!-- Legion -> Apps -->
  <path class="eco-edge" d="M215,46 H24 Q12,46 12,58 V338 Q12,350 24,350 H198"/>         <!-- Vault -> Apps (far-left lane) -->
  <path class="eco-edge" d="M620,46 H716 Q728,46 728,58 V338 Q728,350 716,350 H522"/>   <!-- UiUx -> Apps (far-right lane) -->

  <!-- Foundations (top): Vault (credentials) + UiUx (UI) -->
  <rect class="eco-node" x="215" y="22" width="150" height="48" rx="8"/>
  <text class="eco-title" x="290" y="43">MindAttic.Vault</text>
  <text class="eco-sub"   x="290" y="59">credentials + settings</text>

  <rect class="eco-node" x="470" y="22" width="150" height="48" rx="8"/>
  <text class="eco-title" x="545" y="43">MindAttic.UiUx</text>
  <text class="eco-sub"   x="545" y="59">UI components + themes</text>

  <!-- Service tier (on Vault) -->
  <rect class="eco-node" x="35" y="150" width="130" height="48" rx="8"/>
  <text class="eco-title" x="100" y="171">MindAttic.Psst</text>
  <text class="eco-sub"   x="100" y="187">CLI notifier</text>

  <rect class="eco-node" x="215" y="150" width="150" height="48" rx="8"/>
  <text class="eco-title" x="290" y="171">MindAttic.Legion</text>
  <text class="eco-sub"   x="290" y="187">multi-LLM consensus</text>

  <rect class="eco-node" x="440" y="150" width="140" height="48" rx="8"/>
  <text class="eco-title" x="510" y="171">MindAttic.Console</text>
  <text class="eco-sub"   x="510" y="187">CLI orchestrator</text>

  <!-- Products -->
  <rect class="eco-node" x="200" y="310" width="320" height="78" rx="8"/>
  <text class="eco-title" x="360" y="334">Apps</text>
  <text class="eco-sub"   x="360" y="355">IdiotProof &#183; Tutor &#183; ThinkTank</text>
  <text class="eco-sub"   x="360" y="372">MediaButler &#183; TaxRateCollector</text>
</svg>