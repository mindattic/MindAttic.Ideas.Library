<!doctype html>
<!-- Raw-HTML consumer proof (MAIL-US-B1): the exact authored board markup mindattic.com ships.
     Clicking a tile opens its panel full-row; selection persists per section in localStorage;
     placeholder tiles receive stable procedural art. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TabBoard — raw assets demo</title>
  <link rel="stylesheet" href="assets/tabboard.css">
  <script src="assets/tabboard.js" defer></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #0d1117; color: #e8eaf0; }
    :root { --bg2: #13161b; --bg3: #1a1e25; --border: #2a2f3a; --accent: #6ba3e8; --text: #e8eaf0; --text2: #9aa0b0; }
  </style>
</head>
<body>
  <h2>Authored board (the mindattic.com Software-section markup)</h2>
  <div class="home-sections">
    <div class="board-section">
      <div class="board-grid">
        <button type="button" class="tabButton" data-target="demo-alpha">
          <div class="tabButton-name">Alpha</div>
        </button>
        <div class="tabPage" id="demo-alpha" data-repo="mindattic/Alpha">
          <div class="tabPage-row">
            <div class="tabPage-img tabPage-img--placeholder" aria-hidden="true"></div>
            <div class="tabPage-body"><p class="tabPage-text">First tile — its art is generated procedurally from the name.</p></div>
          </div>
          <div class="tabPage-links"><a class="tabButton-btn" href="#">GitHub</a></div>
        </div>
        <button type="button" class="tabButton" data-target="demo-beta">
          <div class="tabButton-name">Beta</div>
        </button>
        <div class="tabPage" id="demo-beta" data-repo="mindattic/Beta">
          <div class="tabPage-row">
            <div class="tabPage-img tabPage-img--placeholder" aria-hidden="true"></div>
            <div class="tabPage-body"><p class="tabPage-text">Second tile. One tab open per section; click again to close.</p></div>
          </div>
          <div class="tabPage-links"><a class="tabButton-btn" href="#">GitHub</a></div>
        </div>
      </div>
    </div>
  </div>

  <h2>Board built from data (window.TabBoard.build)</h2>
  <div id="dynamic-host"></div>
  <script defer>
    window.addEventListener('DOMContentLoaded', function () {
      document.getElementById('dynamic-host').appendChild(window.TabBoard.build([
        { id: 'dyn-one', name: 'Built at runtime', monogram: '', img: window.TabBoard.art('Built at runtime'),
          body: 'This board came from TabBoard.build(items) — how the frontpage tabifies its links and books.',
          href: '#', linkLabel: 'Open' },
      ]));
    });
  </script>
</body>
</html>
