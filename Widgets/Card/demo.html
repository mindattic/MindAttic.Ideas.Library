  <title>Card — raw assets demo</title>
  <link rel="stylesheet" href="assets/card.css">
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    /* The page-authoring convention: each image IS a class (base64 data, not a file). */

<body>
  <div class="ma-cards">
    <a class="ma-card ma-card-link" href="#">
      <div class="ma-card-image img-docs" role="img" aria-label="Docs"></div>
      <div class="ma-card-body">
        <h3 class="ma-card-title">Documentation</h3>
        <p class="ma-card-text">Guides, the page grammar, and the .idea packaging walkthrough.</p>
        <div class="ma-card-footer">Updated weekly</div>
      </div>
    </a>
    <article class="ma-card">
      <div class="ma-card-body">
        <h3 class="ma-card-title">No image, no link</h3>
        <p class="ma-card-text">A plain informational card.</p>
      </div>
    </article>
    <a class="ma-card ma-card-link" href="#">
      <div class="ma-card-image img-blog" role="img" aria-label="Blog"></div>
      <div class="ma-card-body">
        <h3 class="ma-card-title">Blog</h3>
        <p class="ma-card-text">Release notes and engineering write-ups.</p>
      </div>
    </a>
  </div>
</body>
</html>
