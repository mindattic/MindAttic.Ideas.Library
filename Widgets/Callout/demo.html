<!doctype html>
<!-- Raw-HTML consumer proof (MAIL-US-B1): the exact authoring markup a CMS page would use. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Callout — raw assets demo</title>
  <link rel="stylesheet" href="assets/callout.css">
  <style>body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 44rem; }</style>
</head>
<body>
  <div class="ma-callout"><strong>Info.</strong> The default variant needs only the base class.</div>
  <div class="ma-callout ma-callout-success"><strong>Done.</strong> The package installed cleanly.</div>
  <div class="ma-callout ma-callout-warn"><strong>Heads up.</strong> Shipped versions never mutate — ship V2 alongside V1.</div>
  <div class="ma-callout ma-callout-error"><strong>Failed.</strong> The manifest rejected a host assembly in bin/.</div>
</body>
</html>
